spring.application.name=TradeOps

# Use Render's assigned port, default to 8080 locally
server.port=${PORT:8080}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Use Environment Variables for DB, fallback to local
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5439/tradeops_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Use Environment Variables for Secrets
tradeops.app.secret=${JWT_SECRET:g2S9x1nZb6VQ3p7tM8cJ5r2U1wY4l9NkQ0rTeHwXaEo=}
tradeops.app.admin.username=${ADMIN_USERNAME:admin}
tradeops.app.admin.password=${ADMIN_PASSWORD:admin12345}
tradeops.ssl.encryption.key=${SSL_KEY:12345678901234567890123456789012}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true